name: Fetch VLESS Links

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点运行
  workflow_dispatch:       # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 赋予写入仓库的权限（使用默认 GITHUB_TOKEN 也可，但需启用 write）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 使用 PAT 或默认 GITHUB_TOKEN，但 GITHUB_TOKEN 默认有写权限（若仓库设置允许）
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          # 若使用 GITHUB_TOKEN，需确保 Actions 有写权限，默认有

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          HZ_USERNAME: ${{ secrets.HZ_USERNAME }}
          HZ_PASSWORD: ${{ secrets.HZ_PASSWORD }}
          HZ_CLIENT_SECRET: ${{ secrets.HZ_CLIENT_SECRET }}
        run: python huozhong.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add huozhong_vless_links.txt
          # 仅当有变更时才提交，避免空提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update VLESS links [skip ci]"
            git push
          fi
